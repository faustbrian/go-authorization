name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  GOFLAGS: -mod=readonly

jobs:
  test:
    name: Test (Go ${{ matrix.go }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go:
          - 1.26.x
          - stable
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go }}
          cache-dependency-path: go.sum
      - run: go mod download
      - run: go test ./...

  quality:
    name: Format and vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: stable
          cache-dependency-path: go.sum
      - run: ./scripts/check-format.sh
      - run: go vet ./...

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: stable
          cache-dependency-path: go.sum
      - run: ./scripts/check-coverage.sh

  mutation:
    name: Mutation testing
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: stable
          cache-dependency-path: go.sum
      - run: ./scripts/check-mutation.sh

  race:
    name: Race detector
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: stable
          cache-dependency-path: go.sum
      - run: go test -race ./...

  owned-module-contracts:
    name: Owned module contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: stable
          cache-dependency-path: |
            go.sum
            integration/contracts/go.sum
      - run: ./scripts/check-contracts.sh

  integration:
    name: PostgreSQL ${{ matrix.postgres }} and Valkey ${{ matrix.valkey }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - postgres: 16-alpine
            valkey: 7-alpine
          - postgres: 17-alpine
            valkey: 8-alpine
    services:
      postgres:
        image: postgres:${{ matrix.postgres }}
        env:
          POSTGRES_DB: authorization
          POSTGRES_PASSWORD: authorization
          POSTGRES_USER: authorization
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U authorization -d authorization"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      valkey:
        image: valkey/valkey:${{ matrix.valkey }}
        ports:
          - 6379:6379
        options: >-
          --health-cmd "valkey-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      POSTGRES_URL: postgres://authorization:authorization@localhost:5432/authorization?sslmode=disable
      VALKEY_ADDRESS: localhost:6379
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: stable
          cache-dependency-path: go.sum
      - run: go test -count=1 -run '^TestIntegration' ./postgres ./valkey

  fuzz:
    name: Fuzz smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: stable
          cache-dependency-path: go.sum
      - run: go test ./policy -run '^$' -fuzz '^FuzzDecode$' -fuzztime=10s
      - run: go test ./acl -run '^$' -fuzz '^FuzzDecodeDocument$' -fuzztime=10s
      - run: go test ./rbac -run '^$' -fuzz '^FuzzDecodeDocument$' -fuzztime=10s
      - run: go test ./abac -run '^$' -fuzz '^FuzzDecodeDocument$' -fuzztime=10s

  benchmarks:
    name: Benchmark smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: stable
          cache-dependency-path: go.sum
      - run: >-
          go test -run '^$' -bench '^Benchmark'
          -benchmem -benchtime=100ms ./...

  docs-and-examples:
    name: Documentation and examples
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: stable
          cache-dependency-path: go.sum
      - run: ./scripts/check-docs.sh

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: stable
          cache-dependency-path: go.sum
      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11

  vulnerability:
    name: Vulnerability scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: golang/govulncheck-action@v1
        with:
          go-version-file: go.mod
          go-package: ./...

  api:
    name: API compatibility
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: stable
          cache-dependency-path: go.sum
      - run: ./scripts/check-api.sh

  dependency-review:
    name: Dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/dependency-review-action@v4
