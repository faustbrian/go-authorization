name: Release

on:
  push:
    tags:
      - v[0-9]+.[0-9]+.[0-9]+

permissions:
  contents: write

env:
  GOFLAGS: -mod=readonly

jobs:
  release:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: authorization
          POSTGRES_PASSWORD: authorization
          POSTGRES_USER: authorization
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U authorization -d authorization"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      valkey:
        image: valkey/valkey:8-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "valkey-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      POSTGRES_URL: postgres://authorization:authorization@localhost:5432/authorization?sslmode=disable
      VALKEY_ADDRESS: localhost:6379
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version: stable
          cache-dependency-path: go.sum
      - name: Verify annotated tag
        run: test "$(git cat-file -t "$GITHUB_REF_NAME")" = tag
      - name: Verify changelog section
        run: ./scripts/release-notes.sh "$GITHUB_REF_NAME" > release-notes.md
      - run: ./scripts/check-format.sh
      - run: ./scripts/check-contracts.sh
      - run: go vet ./...
      - run: ./scripts/check-coverage.sh
      - run: go test -race ./...
      - run: go test -count=1 -run '^TestIntegration' ./postgres ./valkey
      - run: ./scripts/check-api.sh
      - name: Vulnerability scan
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...
      - name: Build reproducible archives
        run: |
          ./scripts/build-release.sh "$GITHUB_REF_NAME"
          cp "dist/go-authorization-${GITHUB_REF_NAME}.tar.gz" /tmp/first.tar.gz
          rm -rf dist
          ./scripts/build-release.sh "$GITHUB_REF_NAME"
          cmp /tmp/first.tar.gz "dist/go-authorization-${GITHUB_REF_NAME}.tar.gz"
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "$GITHUB_REF_NAME"
          dist/*
          --verify-tag
          --title "$GITHUB_REF_NAME"
          --notes-file release-notes.md
